<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <title>Payment Successful | Collect My Item</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; overflow-x: hidden; }
    .page { max-width: min(94vw, 720px); margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #e6e6e6; border-radius: 14px; padding: 18px; background: #fff; }
    .ok { font-size: clamp(18px, 4vw, 22px); font-weight: 700; margin: 0 0 8px; }
    .muted { color: #666; margin: 0 0 14px; }
    .ref { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #f5f5f5; padding: 10px 12px; border-radius: 10px; display: inline-block; word-break: break-all; max-width: 100%; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 14px; margin-top: 14px; border-radius: 10px; border: 1px solid #111; text-decoration: none; }
    @media (max-width: 480px) { .page { padding: 0 12px; margin: 24px auto; } .card { padding: 16px; } }
    @media (max-width: 360px) { .page { padding: 0 10px; margin: 20px auto; } .card { padding: 14px; } }
  </style>
</head>
<body>
  <main class="page">
    <div class="card">
      <p class="ok">✅ Payment received</p>
      <p class="muted">Thanks — your booking deposit has been paid successfully.</p>

      <p><strong>Booking reference:</strong></p>
      <div class="ref" id="bookingRef">CMI-XXXXXX</div>

      <p class="muted" style="margin-top:14px;">
        A driver will contact you ASAP.
      </p>

      <a class="btn" href="/">Back to home</a>
    </div>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get("bookingRef");
      const el = document.getElementById("bookingRef");
      if (el) el.textContent = ref || "CMI-XXXXXX";
    })();
  </script>
</body>
</html>
