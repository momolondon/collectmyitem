<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <title>Admin — Collect My Item</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 24px; font-size: 1.5rem; }
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .kpi { background: #1e293b; border-radius: 12px; padding: 20px; }
    .kpi__label { font-size: 0.85rem; color: #94a3b8; margin-bottom: 4px; }
    .kpi__value { font-size: 1.5rem; font-weight: 700; }
    .table-wrap { overflow-x: auto; background: #1e293b; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; }
    th { background: #0f172a; font-weight: 600; font-size: 0.85rem; }
    tr:hover { background: rgba(255,255,255,.03); }
    th.col-ref, td.col-ref { position: sticky; left: 0; z-index: 2; background: #1e293b; min-width: 100px; width: 100px; box-shadow: 2px 0 4px rgba(0,0,0,.15); }
    th.col-ref { background: #0f172a; }
    tr:hover td.col-ref { background: rgba(30,41,59,.98); }
    th.col-actions, td.col-actions { position: sticky; left: 100px; z-index: 2; background: #1e293b; min-width: 96px; white-space: nowrap; box-shadow: 2px 0 4px rgba(0,0,0,.15); }
    th.col-actions { background: #0f172a; }
    tr:hover td.col-actions { background: rgba(30,41,59,.98); }
    .actions-stack { display: flex; flex-direction: row; flex-wrap: wrap; gap: 4px; align-items: center; }
    .actions-stack .btn--action { min-height: 28px; padding: 4px 8px; font-size: 0.78rem; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; gap: 4px; width: auto; }
    .actions-dropdown { display: none; position: relative; }
    .actions-dropdown .btn--trigger { min-height: 28px; padding: 4px 8px; font-size: 0.78rem; border-radius: 6px; }
    .actions-dropdown .actions-menu { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 6px; min-width: 120px; z-index: 10; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
    .actions-dropdown.open .actions-menu { display: flex; flex-direction: column; gap: 4px; }
    .actions-dropdown .actions-menu .btn { min-height: 28px; padding: 4px 8px; font-size: 0.78rem; border-radius: 6px; justify-content: flex-start; }
    .btn { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; cursor: pointer; border: none; }
    .btn--sm { padding: 6px 10px; font-size: 0.85rem; }
    .note-icon-btn { padding: 4px 8px; min-width: auto; font-size: 1rem; }
    .btn--primary { background: #3b82f6; color: #fff; }
    .btn--primary:hover { background: #2563eb; }
    .btn--ghost { background: transparent; color: #94a3b8; }
    .btn--ghost:hover { color: #fff; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.8rem; }
    .badge--paid { background: #065f46; color: #6ee7b7; }
    .badge--unpaid { background: #7f1d1d; color: #fca5a5; }
    .badge--pending { background: #78350f; color: #fcd34d; }
    .empty { text-align: center; padding: 48px; color: #64748b; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
    .modal.open { display: flex; }
    .modal__inner { background: #1e293b; border-radius: 12px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 24px; }
    .modal__title { margin: 0 0 20px; font-size: 1.2rem; }
    .modal__close { float: right; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.5rem; line-height: 1; padding: 0 4px; }
    .modal__close:hover { color: #fff; }
    .modal__section { margin-bottom: 16px; }
    .modal__section:last-child { margin-bottom: 0; }
    .modal__label { font-size: 0.8rem; color: #64748b; margin-bottom: 2px; }
    .modal__value { font-size: 0.95rem; }
    .modal__link { display: inline-block; margin-top: 16px; color: #3b82f6; text-decoration: none; font-size: 0.9rem; }
    .modal__link:hover { text-decoration: underline; }
    .btn--whatsapp { background: #25d366; color: #fff; }
    .btn--whatsapp:hover { background: #20bd5a; }
    .driver-paid-cb { width: 20px; height: 20px; cursor: pointer; accent-color: #059669; }
    .driver-paid-cb:disabled { cursor: not-allowed; opacity: 0.5; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #e2e8f0; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; box-shadow: 0 4px 12px rgba(0,0,0,.4); z-index: 200; animation: toast-in .2s ease; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .header-row h1 { margin: 0; }
    .hidden { display: none !important; }
    #profitModal:not(.hidden) { display: flex; }
    .report-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; margin-bottom: 20px; }
    .report-controls label { display: flex; flex-direction: column; gap: 4px; font-size: 0.85rem; color: #94a3b8; }
    .report-controls input[type="date"] { padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; }
    .btn--success { background: #059669; color: #fff; }
    .btn--success:hover { background: #047857; }
    .report-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .report-summary .kpi { margin: 0; }
    .modal__inner--wide { max-width: 900px; }
    body { overflow-x: hidden; }
    @media (max-width: 768px) {
      .actions-stack { display: none; }
      .actions-dropdown { display: block; }
      th.col-actions, td.col-actions { min-width: 96px; left: 90px; }
      th.col-ref, td.col-ref { min-width: 90px; }
    }
    @media (max-width: 480px) {
      .container { padding: 12px; }
      .kpis { grid-template-columns: 1fr; gap: 12px; margin-bottom: 24px; }
      .kpi { padding: 16px; }
      th, td { padding: 10px 12px; font-size: 0.9rem; }
      .btn { min-height: 44px; padding: 10px 16px; display: inline-flex; align-items: center; }
      .modal { padding: 12px; }
      .modal__inner { padding: 18px; max-height: 85vh; }
    }
    @media (max-width: 360px) {
      .container { padding: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>Admin Dashboard</h1>
      <button id="openProfitReport" class="btn btn--primary">Profit report</button>
    </div>
    <div class="kpis" id="kpis">
      <div class="kpi">
        <div class="kpi__label">Total bookings</div>
        <div class="kpi__value" id="totalBookings">—</div>
      </div>
      <div class="kpi">
        <div class="kpi__label">Total revenue</div>
        <div class="kpi__value" id="totalRevenue">—</div>
      </div>
      <div class="kpi">
        <div class="kpi__label">Platform profit</div>
        <div class="kpi__value" id="platformProfit">—</div>
      </div>
      <div class="kpi">
        <div class="kpi__label">Driver payouts owed</div>
        <div class="kpi__value" id="driverPayoutsOwed">—</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="col-ref">Booking ref</th>
            <th class="col-actions">Actions</th>
            <th>Date</th>
            <th>Phone</th>
            <th>Note</th>
            <th>Pickup</th>
            <th>Dropoff</th>
            <th>Customer price</th>
            <th>Deposit/Profit</th>
            <th>Driver payout/Remaining</th>
            <th>Job status</th>
            <th>Driver paid</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="11" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div id="profitModal" class="modal hidden">
    <div class="modal__inner modal__inner--wide">
      <h2 class="modal__title">Profit report</h2>
      <div class="report-controls">
        <label>
          From
          <input type="date" id="reportFrom">
        </label>
        <label>
          To
          <input type="date" id="reportTo">
        </label>
        <button id="runReport" class="btn btn--primary">Run report</button>
        <button id="exportReport" class="btn btn--success">Export CSV</button>
        <button id="closeProfitReport" class="btn btn--ghost">Close</button>
      </div>
      <div id="reportSummary" class="report-summary"></div>
      <div class="table-wrap">
        <table id="reportTable"></table>
      </div>
    </div>
  </div>
  <div id="viewModal" class="modal">
    <div class="modal__inner">
      <button type="button" class="modal__close" id="modalClose" aria-label="Close">&times;</button>
      <h2 class="modal__title" id="modalTitle">Booking details</h2>
      <div id="modalContent"></div>
      <a href="#" id="modalFullLink" class="modal__link">View full booking page →</a>
    </div>
  </div>
  <script>
    (function () {
      const tbody = document.getElementById("tbody");
      const totalBookingsEl = document.getElementById("totalBookings");
      const totalRevenueEl = document.getElementById("totalRevenue");
      const platformProfitEl = document.getElementById("platformProfit");
      const driverPayoutsOwedEl = document.getElementById("driverPayoutsOwed");

      function formatDate(s) {
        if (!s) return "—";
        try {
          const d = new Date(s);
          return isNaN(d.getTime()) ? s : d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
        } catch (_) { return s; }
      }

      function fmt(v) {
        const n = Number(v);
        return Number.isFinite(n) ? "£" + n.toFixed(0) : "—";
      }

      function jobStatusBadge(s) {
        const c = (s || "pending").toLowerCase();
        if (c === "done") return '<span class="badge badge--paid">done</span>';
        return '<span class="badge badge--pending">pending</span>';
      }

      function driverPaidCheckbox(b) {
        const checked = b.driverPaid ? ' checked' : '';
        const disabled = (b.jobStatus || 'pending') !== 'done' ? ' disabled' : '';
        return '<input type="checkbox" class="driver-paid-cb" data-id="' + (b.bookingRef || '') + '"' + checked + disabled + ' title="Driver paid" aria-label="Driver paid">';
      }

      async function load() {
        const res = await fetch("/api/admin/bookings");
        const bookings = await res.json(); // Server returns only paid/paid_deposit with bookingRef
        window.bookings = bookings;
        const totalRevenue = bookings.reduce((s, b) => s + (Number(b.customerPrice) || 0), 0);
        const platformProfit = bookings.reduce((s, b) => s + (Number(b.platformProfit) || 0), 0);
        const driverPayoutsOwed = bookings
          .filter((b) => !b.driverPaid)
          .reduce((s, b) => s + (Number(b.driverPayout) || 0), 0);

        totalBookingsEl.textContent = bookings.length;
        totalRevenueEl.textContent = fmt(totalRevenue);
        platformProfitEl.textContent = fmt(platformProfit);
        driverPayoutsOwedEl.textContent = fmt(driverPayoutsOwed);

        if (!bookings.length) {
          tbody.innerHTML = '<tr><td colspan="12" class="empty">No bookings yet</td></tr>';
          return;
        }

        tbody.innerHTML = bookings
          .map((b) => {
            const ref = b.bookingRef || "";
            const noteVal = (b.customerNote ?? b.notes ?? "").trim();
            const noteCell = noteVal
              ? '<button type="button" class="btn btn--sm btn--ghost note-icon-btn" data-id="' + ref + '" data-action="view" title="View customer note">📝</button>'
              : "—";
            const pickup = (b.pickupAddress || b.pickup || "").slice(0, 30) + ((b.pickupAddress || b.pickup || "").length > 30 ? "…" : "");
            const dropoff = (b.dropoffAddress || b.dropoff || "").slice(0, 30) + ((b.dropoffAddress || b.dropoff || "").length > 30 ? "…" : "");
            const jobStatus = b.jobStatus || "pending";
            const markDoneBtn = jobStatus === "done"
              ? ""
              : '<button type="button" class="btn btn--action btn--primary" data-id="' + b.bookingRef + '" data-action="mark-done">✅ Mark done</button>';
            const viewBtn = '<button type="button" class="btn btn--action btn--ghost" data-id="' + b.bookingRef + '" data-action="view">👁 View</button>';
            const whatsappBtn = '<button type="button" class="btn btn--action btn--whatsapp" data-id="' + b.bookingRef + '" data-action="whatsapp" title="Copy to WhatsApp">💬 WhatsApp</button>';
            const actionsHtml =
              '<div class="actions-stack">' +
              viewBtn + whatsappBtn + markDoneBtn +
              '</div>' +
              '<div class="actions-dropdown">' +
              '<button type="button" class="btn btn--trigger btn--ghost" aria-haspopup="true" aria-expanded="false">Actions ▾</button>' +
              '<div class="actions-menu">' +
              viewBtn + whatsappBtn + markDoneBtn +
              '</div></div>';
            const phone = (b.customerPhone || b.phone || "").trim();
            return (
              "<tr>" +
              '<td class="col-ref">' + ref + "</td>" +
              '<td class="col-actions">' + actionsHtml + "</td>" +
              "<td>" + formatDate(b.date || b.createdAt) + "</td>" +
              "<td>" + (phone || "—") + "</td>" +
              "<td>" + noteCell + "</td>" +
              "<td>" + (pickup || "—") + "</td>" +
              "<td>" + (dropoff || "—") + "</td>" +
              "<td>" + fmt(b.customerPrice) + "</td>" +
              "<td>" + fmt(b.deposit) + "</td>" +
              "<td>" + fmt(b.driverPayout) + "</td>" +
              "<td>" + jobStatusBadge(jobStatus) + "</td>" +
              "<td>" + driverPaidCheckbox(b) + "</td>" +
              "</tr>"
            );
          })
          .join("");

        tbody.querySelectorAll("[data-action=mark-done]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const bookingRef = btn.getAttribute("data-id");
            if (!bookingRef) return;
            btn.closest(".actions-dropdown")?.classList.remove("open");
            btn.disabled = true;
            try {
              const r = await fetch("/api/admin/booking/" + encodeURIComponent(bookingRef) + "/mark-done", { method: "POST" });
              let data;
              try {
                data = await r.json();
              } catch (_) {
                const text = await r.text();
                alert("Error " + r.status + ": " + (text.slice(0, 100) || "Invalid response"));
                btn.disabled = false;
                return;
              }
              if (r.ok) {
                load();
              } else {
                alert(data.error || "Failed");
                btn.disabled = false;
              }
            } catch (e) {
              alert("Network error: " + (e.message || e));
              btn.disabled = false;
            }
          });
        });

        tbody.querySelectorAll(".driver-paid-cb").forEach((cb) => {
          cb.addEventListener("change", async function () {
            if (!this.checked) return;
            const bookingRef = this.getAttribute("data-id");
            if (!bookingRef) return;
            this.disabled = true;
            try {
              const r = await fetch("/api/admin/booking/" + encodeURIComponent(bookingRef) + "/mark-driver-paid", { method: "POST" });
              const data = await r.json();
              if (r.ok) {
                load();
              } else {
                alert(data.error || "Failed");
                this.checked = false;
                this.disabled = false;
              }
            } catch (e) {
              alert("Network error");
              this.checked = false;
              this.disabled = false;
            }
          });
        });

        tbody.querySelectorAll("[data-action=view]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const bookingRef = btn.getAttribute("data-id");
            if (!bookingRef) return;
            btn.closest(".actions-dropdown")?.classList.remove("open");
            showViewModal(bookingRef);
          });
        });

        tbody.querySelectorAll(".actions-dropdown .btn--trigger").forEach((trigger) => {
          trigger.addEventListener("click", (e) => {
            e.stopPropagation();
            const wrap = trigger.closest(".actions-dropdown");
            const isOpen = wrap.classList.contains("open");
            tbody.querySelectorAll(".actions-dropdown.open").forEach((o) => o.classList.remove("open"));
            if (!isOpen) {
              wrap.classList.add("open");
              trigger.setAttribute("aria-expanded", "true");
            } else {
              trigger.setAttribute("aria-expanded", "false");
            }
          });
        });
      }

      document.addEventListener("click", () => {
        tbody.querySelectorAll(".actions-dropdown.open").forEach((wrap) => {
          wrap.classList.remove("open");
          const t = wrap.querySelector(".btn--trigger");
          if (t) t.setAttribute("aria-expanded", "false");
        });
      });

      function esc(s) {
        if (s == null || s === "") return "—";
        const d = document.createElement("div");
        d.textContent = String(s);
        return d.innerHTML;
      }

      function renderItems(b) {
        const items = b.items;
        if (Array.isArray(items) && items.length) {
          return items.map((i) => (i.name || "Item") + " × " + (i.qty || 1)).join(", ");
        }
        const details = b.itemDetails;
        const count = b.itemCount;
        if (details) return details + (count ? " (count: " + count + ")" : "");
        if (count) return count + " item(s)";
        return "—";
      }

      async function showViewModal(bookingRef) {
        const modal = document.getElementById("viewModal");
        const content = document.getElementById("modalContent");
        const title = document.getElementById("modalTitle");
        const fullLink = document.getElementById("modalFullLink");
        fullLink.href = "/admin/booking/" + encodeURIComponent(bookingRef);
        content.innerHTML = '<div class="empty">Loading…</div>';
        modal.classList.add("open");
        try {
          const r = await fetch("/api/admin/booking/" + encodeURIComponent(bookingRef));
          if (!r.ok) throw new Error("Not found");
          const b = await r.json();
          const distanceMiles = b.miles != null ? Number(b.miles).toFixed(1) + " miles" : "—";
          const stairsPickup = b.stairsPickup === "yes" ? "Yes" : "No";
          const stairsDropoff = b.stairsDropoff === "yes" ? "Yes" : "No";
          title.textContent = "Booking " + (b.bookingRef || "");
          const customerNote = (b.customerNote ?? b.notes ?? "").trim();
          content.innerHTML =
            '<div class="modal__section"><div class="modal__label">Customer name</div><div class="modal__value">' + esc(b.customerName || b.name) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Customer phone</div><div class="modal__value">' + esc(b.customerPhone || b.phone) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Customer email</div><div class="modal__value">' + esc(b.customerEmail || b.email) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Customer note</div><div class="modal__value">' + esc(customerNote || "—") + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Pickup address</div><div class="modal__value">' + esc(b.pickupAddress || b.pickup) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Dropoff address</div><div class="modal__value">' + esc(b.dropoffAddress || b.dropoff) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Items</div><div class="modal__value">' + esc(renderItems(b)) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Helpers</div><div class="modal__value">' + (b.helpers ?? b.helper ?? "0") + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Stairs (pickup / dropoff)</div><div class="modal__value">' + stairsPickup + " / " + stairsDropoff + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Distance</div><div class="modal__value">' + distanceMiles + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Deposit/Profit</div><div class="modal__value">' + fmt(b.deposit) + "</div></div>" +
            '<div class="modal__section"><div class="modal__label">Driver payout/Remaining</div><div class="modal__value">' + fmt(b.driverPayout) + "</div></div>";
        } catch (e) {
          content.innerHTML = '<div class="error">Failed to load booking</div>';
        }
      }

      document.getElementById("modalClose").addEventListener("click", () => {
        document.getElementById("viewModal").classList.remove("open");
      });
      document.getElementById("viewModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("viewModal")) {
          document.getElementById("viewModal").classList.remove("open");
        }
      });

      function extractPostcode(addr) {
        if (!addr) return "";
        const s = typeof addr === "string" ? addr : (addr.postcode || addr.formattedAddress || "");
        if (!s) return "";
        const m = s.match(/[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}/i);
        if (m) return m[0].trim().toUpperCase();
        const outward = s.match(/[A-Z]{1,2}\d[A-Z\d]?/i);
        return outward ? outward[0].toUpperCase() : s.slice(0, 8);
      }

      function buildWhatsAppMessage(b) {
        const bookingId = b.bookingRef || "";
        const pickup = b.pickup && typeof b.pickup === "object" ? b.pickup : null;
        const dropoff = b.dropoff && typeof b.dropoff === "object" ? b.dropoff : null;
        const pickupPostcode = pickup?.postcode || extractPostcode(b.pickupAddress || b.pickup) || "—";
        const dropoffPostcode = dropoff?.postcode || extractPostcode(b.dropoffAddress || b.dropoff) || "—";
        let itemsSummary = "—";
        if (Array.isArray(b.items) && b.items.length) {
          itemsSummary = b.items.map((i) => (i.name || "Item") + " × " + (i.qty || 1)).join(", ");
        } else if (Array.isArray(b.itemsList) && b.itemsList.length) {
          itemsSummary = b.itemsList.join(", ");
        } else if (b.itemDetails) itemsSummary = b.itemDetails;
        const helpers = (b.helpers ?? b.helper ?? 0).toString();
        const stairsPickup = (b.stairsPickup === "yes" || b.stairsPickup === true) ? "Yes" : "No";
        const stairsDropoff = (b.stairsDropoff === "yes" || b.stairsDropoff === true) ? "Yes" : "No";
        const stairs = stairsPickup + " / " + stairsDropoff;
        const customerPrice = Number.isFinite(Number(b.customerPrice)) ? "£" + Number(b.customerPrice).toFixed(0) : "—";
        const driverPayout = Number.isFinite(Number(b.driverPayout)) ? "£" + Number(b.driverPayout).toFixed(0) : "—";
        const customerNote = (b.customerNote ?? b.notes ?? "").trim();
        return (
          "----------------------------------------\n" +
          "🚚 NEW DELIVERY JOB\n\n" +
          "Booking ID: " + bookingId + "\n\n" +
          "Pickup area: " + pickupPostcode + "\n" +
          "Dropoff area: " + dropoffPostcode + "\n\n" +
          "Items: " + itemsSummary + "\n\n" +
          "Helpers: " + helpers + "\n" +
          "Stairs: " + stairs + "\n\n" +
          (customerNote ? "Customer note: " + customerNote + "\n\n" : "") +
          "Customer price: " + customerPrice + "\n" +
          "Driver payout: " + driverPayout + "\n\n" +
          "Reply: ACCEPT " + bookingId + "\n" +
          "----------------------------------------"
        );
      }

      function showToast(msg) {
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }

      document.addEventListener("click", (e) => {
        const btn = e.target.closest('[data-action="whatsapp"]');
        if (!btn) return;
        const bookingRef = btn.getAttribute("data-id");
        if (!bookingRef || !window.bookings) return;
        const b = window.bookings.find((x) => x.bookingRef === bookingRef);
        if (!b) return;
        const msg = buildWhatsAppMessage(b);
        navigator.clipboard.writeText(msg).then(() => {
          showToast("Job copied. Paste into WhatsApp driver group.");
          window.open("https://web.whatsapp.com/", "_blank");
        }).catch(() => {
          window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
          showToast("Opened WhatsApp with message.");
        });
      });

      // ——— Profit Report ———
      let lastFilteredBookings = [];
      document.getElementById("openProfitReport").onclick = () => {
        document.getElementById("profitModal").classList.remove("hidden");
      };
      document.getElementById("closeProfitReport").onclick = () => {
        document.getElementById("profitModal").classList.add("hidden");
      };
      document.getElementById("profitModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("profitModal")) {
          document.getElementById("profitModal").classList.add("hidden");
        }
      });

      function getBookingDate(b) {
        const s = b.date || b.createdAt;
        if (!s) return null;
        const d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
      }

      function runReport() {
        const fromVal = document.getElementById("reportFrom").value;
        const toVal = document.getElementById("reportTo").value;
        const bookings = window.bookings || [];
        let filtered = bookings;
        if (fromVal || toVal) {
          const fromMs = fromVal ? new Date(fromVal + "T00:00:00").getTime() : -Infinity;
          const toMs = toVal ? new Date(toVal + "T23:59:59").getTime() : Infinity;
          filtered = bookings.filter((b) => {
            const d = getBookingDate(b);
            if (!d) return false;
            const t = d.getTime();
            return t >= fromMs && t <= toMs;
          });
        }
        lastFilteredBookings = filtered;
        const totalBookings = filtered.length;
        const totalRevenue = filtered.reduce((s, b) => s + (Number(b.customerPrice) || 0), 0);
        const platformProfit = filtered.reduce((s, b) => s + (Number(b.platformProfit) || 0), 0);
        const driverPayout = filtered.reduce((s, b) => s + (Number(b.driverPayout) || 0), 0);
        const depositCollected = filtered.reduce((s, b) => s + (Number(b.deposit) || 0), 0);
        const remainingBalance = filtered.reduce((s, b) => s + (Number(b.remainingBalance) || Number(b.remaining) || 0), 0);

        const summaryEl = document.getElementById("reportSummary");
        summaryEl.innerHTML =
          '<div class="kpi"><div class="kpi__label">Total bookings</div><div class="kpi__value">' + totalBookings + "</div></div>" +
          '<div class="kpi"><div class="kpi__label">Total revenue</div><div class="kpi__value">' + fmt(totalRevenue) + "</div></div>" +
          '<div class="kpi"><div class="kpi__label">Platform profit</div><div class="kpi__value">' + fmt(platformProfit) + "</div></div>" +
          '<div class="kpi"><div class="kpi__label">Driver payouts</div><div class="kpi__value">' + fmt(driverPayout) + "</div></div>" +
          '<div class="kpi"><div class="kpi__label">Deposit collected</div><div class="kpi__value">' + fmt(depositCollected) + "</div></div>" +
          '<div class="kpi"><div class="kpi__label">Remaining balance</div><div class="kpi__value">' + fmt(remainingBalance) + "</div></div>";

        const tableEl = document.getElementById("reportTable");
        if (!filtered.length) {
          tableEl.innerHTML = '<tbody><tr><td colspan="6" class="empty">No bookings in date range</td></tr></tbody>';
          return;
        }
        tableEl.innerHTML =
          "<thead><tr><th>Booking ref</th><th>Date</th><th>Customer price</th><th>Deposit/Profit</th><th>Driver payout/Remaining</th><th>Job status</th></tr></thead>" +
          "<tbody>" +
          filtered.map((b) => {
            const ref = b.bookingRef || "";
            const dateStr = formatDate(b.date || b.createdAt);
            const jobStatus = b.jobStatus || "pending";
            const jobStatusHtml = jobStatusBadge(jobStatus);
            return (
              "<tr>" +
              "<td>" + ref + "</td>" +
              "<td>" + dateStr + "</td>" +
              "<td>" + fmt(b.customerPrice) + "</td>" +
              "<td>" + fmt(b.deposit) + "</td>" +
              "<td>" + fmt(b.driverPayout) + "</td>" +
              "<td>" + jobStatusHtml + "</td>" +
              "</tr>"
            );
          }).join("") +
          "</tbody>";
      }

      document.getElementById("runReport").onclick = runReport;

      document.getElementById("exportReport").onclick = () => {
        const rows = lastFilteredBookings;
        if (!rows.length) {
          showToast("Run report first to export.");
          return;
        }
        const headers = ["Booking ref", "Date", "Customer price", "Deposit/Profit", "Driver payout/Remaining", "Job status"];
        const csvRows = [headers.join(",")];
        function csvEsc(s) {
          const t = String(s == null ? "" : s);
          return t.includes(",") || t.includes('"') || t.includes("\n") ? '"' + t.replace(/"/g, '""') + '"' : t;
        }
        rows.forEach((b) => {
          const id = csvEsc(b.bookingRef || "");
          const dateStr = csvEsc(b.date || b.createdAt);
          const cust = Number(b.customerPrice) || 0;
          const dep = Number(b.deposit) || 0;
          const drv = Number(b.driverPayout) || 0;
          const jobStatus = csvEsc(b.jobStatus || "pending");
          csvRows.push([id, dateStr, cust, dep, drv, jobStatus].join(","));
        });
        const csv = csvRows.join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "profit-report-" + new Date().toISOString().slice(0, 10) + ".csv";
        a.click();
        URL.revokeObjectURL(url);
        showToast("Report exported.");
      };

      load();
    })();
  </script>
</body>
</html>
